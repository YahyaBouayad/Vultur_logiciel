services:

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: vultur_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vultur_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d vultur_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/vultur_db
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: https://${APP_DOMAIN}
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vultur_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${API_DOMAIN}
    restart: always
    environment:
      PORT: "3000"
    networks:
      - vultur_net

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - vultur_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  vultur_net:
